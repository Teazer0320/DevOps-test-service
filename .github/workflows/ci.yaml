name: C++ CI with Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        # Using the secrets we configured earlier
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Make sure your Docker Hub username is correct in the Secret
        tags: ${{ secrets.DOCKER_USERNAME }}/devops-test-service:latest

    # Optional: This step will only run if the build is successful
    - name: Image digest
      run: echo "Image has been pushed successfully!"