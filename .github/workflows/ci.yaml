name: C++ CI with Docker Hub

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'  # 觸發條件：推送到 main 分支或推送 tag

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Determine version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          # 如果是 tag，使用 tag 名稱（例如 v1.0.0）
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          # 否則使用 commit SHA 的前 7 位（例如 abc1234）
          echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        fi
        echo "Building version: $(git rev-parse --short HEAD || echo ${GITHUB_REF#refs/tags/})"

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/devops-test-service:${{ steps.version.outputs.VERSION }}
          ${{ secrets.DOCKER_USERNAME }}/devops-test-service:latest

    - name: Image pushed successfully
      run: |
        echo "✅ Image has been pushed successfully!"
        echo "📦 Version: ${{ steps.version.outputs.VERSION }}"
        echo "🏷️  Tags:"
        echo "   - ${{ secrets.DOCKER_USERNAME }}/devops-test-service:${{ steps.version.outputs.VERSION }}"
        echo "   - ${{ secrets.DOCKER_USERNAME }}/devops-test-service:latest"

    - name: Checkout GitOps repository
      uses: actions/checkout@v3
      with:
        repository: ${{ secrets.GITOPS_REPO }}  # 例如: teazer0/DevOps-test-gitOps
        token: ${{ secrets.GITOPS_TOKEN }}  # 需要有寫入權限的 Personal Access Token
        path: gitops-repo

    - name: Update deployment manifest
      run: |
        cd gitops-repo
        sed -i "s|image: .*/devops-test-service:.*|image: ${{ secrets.DOCKER_USERNAME }}/devops-test-service:${{ steps.version.outputs.VERSION }}|g" manifests/deployment.yaml
        cat manifests/deployment.yaml

    - name: Commit and push changes
      run: |
        cd gitops-repo
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add manifests/deployment.yaml
        git commit -m "Update image to ${{ steps.version.outputs.VERSION }}
        
        Co-Authored-By: Oz <oz-agent@warp.dev>" || echo "No changes to commit"
        git push
